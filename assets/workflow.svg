<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 580" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="580" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Receipt Intelligence Workflow</text>
  <text x="580" y="68" text-anchor="middle" font-size="14" fill="#64748b">Image Input  →  Vision-Language Model  →  Structured Output  →  Decision  →  Final Result</text>

  <!-- ===== Main pipeline ===== -->
  <!-- Stage 1 -->
  <rect x="30" y="100" width="200" height="160" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="54" cy="128" r="14" fill="#2563eb"/>
  <text x="54" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <text x="76" y="133" font-size="14" font-weight="700" fill="#1e3a8a">Image Input</text>
  <text x="48" y="168" font-size="11.5" fill="#475569">Receipt photo,</text>
  <text x="48" y="186" font-size="11.5" fill="#475569">file upload, or a</text>
  <text x="48" y="204" font-size="11.5" fill="#475569">real CORD sample</text>

  <!-- Stage 2 (AI) -->
  <rect x="254" y="100" width="200" height="160" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <circle cx="278" cy="128" r="14" fill="#7c3aed"/>
  <text x="278" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <text x="299" y="133" font-size="12.5" font-weight="700" fill="#5b21b6">Vision-Language Model</text>
  <text x="272" y="164" font-size="11.5" fill="#475569">Google Gemini 2.5 Flash</text>
  <text x="272" y="182" font-size="11.5" fill="#475569">few-shot prompt +</text>
  <text x="272" y="200" font-size="11.5" fill="#475569">Pydantic response schema</text>
  <text x="272" y="224" font-size="10.5" fill="#7c3aed">auto-retry (429/503) · mock mode</text>

  <!-- Stage 3 -->
  <rect x="478" y="100" width="200" height="160" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="502" cy="128" r="14" fill="#2563eb"/>
  <text x="502" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <text x="524" y="133" font-size="14" font-weight="700" fill="#1e3a8a">Structured Output</text>
  <text x="496" y="164" font-size="11.5" fill="#475569">Validated JSON:</text>
  <text x="496" y="182" font-size="11.5" fill="#475569">merchant, date, line items,</text>
  <text x="496" y="200" font-size="11.5" fill="#475569">subtotal, tax, total,</text>
  <text x="496" y="218" font-size="11.5" fill="#475569">currency, confidence</text>

  <!-- Stage 4 -->
  <rect x="702" y="100" width="200" height="160" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="726" cy="128" r="14" fill="#2563eb"/>
  <text x="726" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
  <text x="748" y="133" font-size="14" font-weight="700" fill="#1e3a8a">Decision Engine</text>
  <text x="720" y="164" font-size="11.5" fill="#475569">Deterministic Python rules:</text>
  <text x="720" y="182" font-size="11.5" fill="#475569">verify total (tax or Σ items),</text>
  <text x="720" y="200" font-size="11.5" fill="#475569">confidence ≥ 0.70,</text>
  <text x="720" y="218" font-size="11.5" fill="#475569">currency-aware amount cap</text>

  <!-- Stage 5 -->
  <rect x="926" y="100" width="200" height="160" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="950" cy="128" r="14" fill="#2563eb"/>
  <text x="950" y="133" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
  <text x="972" y="133" font-size="14" font-weight="700" fill="#1e3a8a">Final Result</text>
  <text x="944" y="168" font-size="11.5" fill="#475569">Clean report + JSON</text>
  <text x="944" y="186" font-size="11.5" fill="#475569">download, with the</text>
  <text x="944" y="204" font-size="11.5" fill="#475569">decision status</text>

  <!-- pipeline arrows -->
  <line x1="232" y1="180" x2="252" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="456" y1="180" x2="476" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="180" x2="700" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="904" y1="180" x2="924" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Decision outcomes ===== -->
  <line x1="802" y1="260" x2="802" y2="292" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="705" y="288" font-size="11.5" font-weight="600" fill="#334155">Decision status is one of:</text>
  <rect x="705" y="298" width="132" height="32" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="771" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">AUTO-APPROVE</text>
  <rect x="847" y="298" width="132" height="32" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="913" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">NEEDS REVIEW</text>
  <rect x="989" y="298" width="132" height="32" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1055" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">REJECT</text>

  <!-- ===== Evaluation lane ===== -->
  <line x1="30" y1="378" x2="1130" y2="378" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="404" font-size="15" font-weight="700" fill="#0f172a">How we measured it — offline evaluation on real data</text>

  <rect x="30" y="420" width="300" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="50" y="452" font-size="13" font-weight="700" fill="#334155">CORD dataset</text>
  <text x="50" y="476" font-size="11.5" fill="#475569">Thousands of real receipts,</text>
  <text x="50" y="494" font-size="11.5" fill="#475569">each with a human-written</text>
  <text x="50" y="512" font-size="11.5" fill="#475569">ground-truth JSON</text>

  <rect x="360" y="420" width="300" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="380" y="452" font-size="13" font-weight="700" fill="#334155">Run the workflow on 15</text>
  <text x="380" y="476" font-size="11.5" fill="#475569">Compare two prompts:</text>
  <text x="380" y="494" font-size="11.5" fill="#475569">plain rules vs. few-shot</text>
  <text x="380" y="512" font-size="11.5" fill="#475569">(same model, same images)</text>

  <rect x="690" y="420" width="440" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="712" y="452" font-size="13" font-weight="700" fill="#15803d">Score vs. ground truth → measured accuracy</text>
  <text x="712" y="478" font-size="12" fill="#334155">Total amount: <tspan font-weight="700" fill="#15803d">100%</tspan>   ·   Tax: <tspan font-weight="700" fill="#15803d">100%</tspan>   ·   Subtotal: <tspan font-weight="700" fill="#15803d">82%</tspan></text>
  <text x="712" y="500" font-size="11.5" fill="#475569">Few-shot lifted totals from 92.9% (plain prompt) to 100%.</text>
  <text x="712" y="518" font-size="11.5" fill="#475569">Item-count 80% = human/model line-grouping differences.</text>

  <line x1="330" y1="480" x2="358" y2="480" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="480" x2="688" y2="480" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
